  # ── Test: TOML parser ─────────────────────────────────────────────────────
  test-toml:
    name: Test TOML parser
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4
      - name: Install pixi
        run: curl -fsSL https://pixi.sh/install.sh | sh
