name: CI
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

defaults:
  run:
    shell: bash

# Shared setup repeated per job (GitHub Actions has no job-level includes,
# so we keep each job self-contained for clarity and parallelism).

jobs:
  # ── Test: BigDecimal ─────────────────────────────────────────────────────────
  test-bigdecimal:
    name: Test BigDecimal
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4
      - name: Install pixi
        run: curl -fsSL https://pixi.sh/install.sh | sh
      - name: Add pixi to PATH
        run: |
          echo "PIXI_HOME=$HOME/.pixi" >> $GITHUB_ENV
          echo "$HOME/.pixi/bin" >> $GITHUB_PATH
      - name: pixi install
        run: pixi install
      - name: Build packages
        run: |
          pixi run mojo package src/decimo && cp decimo.mojopkg tests/
      - name: Run tests
        run: bash ./tests/test_bigdecimal.sh

  # ── Test: BigInt ─────────────────────────────────────────────────────────────
  test-bigint:
    name: Test BigInt
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      DEBIAN_FRONTEND: noninteractive
